name: Update Anime List

on:
  schedule:
    # Run every 24 hours
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: update-anime-list
  cancel-in-progress: true

jobs:
  update-anime-list:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update data
        run: |
          node scripts/update-data.js
      

      
      - name: Commit and push changes
        run: |
          git config --local user.email "ram22002222@gmail.com"
          git config --local user.name "ram22002"
          git add public/anime-list-full.json public/mappings.json public/master_anime.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update anime-list-full.json with latest mappings"
            git push origin main
          fi
